name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build packages and docs
        run: pnpm build

      - name: Verify package artifacts
        run: pnpm verify:package

      - name: Build Storybook
        run: pnpm storybook:build

  react-compatibility:
    name: React ${{ matrix.react-version }} compatibility
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version:
          - 18.2.0
          - 19.0.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React package
        run: pnpm --filter @rush_ui/react build

      - name: Install packed package with React ${{ matrix.react-version }}
        env:
          REACT_VERSION: ${{ matrix.react-version }}
        run: |
          npm pack ./packages/react --pack-destination "$RUNNER_TEMP" --json > "$RUNNER_TEMP/pack.json"
          PACKAGE_NAME=$(node -e 'const fs = require("node:fs"); console.log(JSON.parse(fs.readFileSync(process.argv[1], "utf8"))[0].filename)' "$RUNNER_TEMP/pack.json")
          FIXTURE_DIR="$RUNNER_TEMP/react-$REACT_VERSION"
          mkdir -p "$FIXTURE_DIR"
          node -e 'require("node:fs").writeFileSync(process.argv[1], JSON.stringify({ private: true, type: "module" }))' "$FIXTURE_DIR/package.json"
          npm install --prefix "$FIXTURE_DIR" --ignore-scripts "react@$REACT_VERSION" "react-dom@$REACT_VERSION" "$RUNNER_TEMP/$PACKAGE_NAME"
          node scripts/verify-react-compatibility.mjs "$FIXTURE_DIR" "$REACT_VERSION"
